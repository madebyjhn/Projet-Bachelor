name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint & Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: projet-startup

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: projet-startup/package-lock.json

      - name: Installation des dépendances
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Tests unitaires (Jest)
        run: npm test
